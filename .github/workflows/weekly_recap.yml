name: Weekly recap

# GitHub Actions cron is always UTC. 14:00 UTC ≈ 10:00 ET during EDT and
# 09:00 ET during EST — the trigger shifts by an hour at DST boundaries.
# Tuesday after Monday Night Football, late enough that final scores are
# settled.
on:
  schedule:
    - cron: '0 14 * * 2'
  workflow_dispatch:
    inputs:
      week:
        description: 'NFL week (1-18). Leave blank to auto-detect via /v1/state/nfl.'
        required: false
        type: string
        default: ''
      season:
        description: 'Season year (e.g. 2024). Leave blank for the current league season.'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  recap:
    runs-on: ubuntu-latest
    # Hoisted so step-level `if:` conditions can reference `env.RECAP_WEBHOOK_URL`.
    # GitHub Actions disallows direct `secrets.X` references in step `if:`.
    env:
      RECAP_WEBHOOK_URL: ${{ secrets.RECAP_WEBHOOK_URL }}
      RECAP_WEBHOOK_FORMAT: ${{ vars.RECAP_WEBHOOK_FORMAT }}
    steps:
      - uses: actions/checkout@v6
        with:
          # peter-evans/create-pull-request needs full history to detect
          # whether the head branch already exists and rebase against it.
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r tools/requirements.txt

      - name: Generate recap
        id: generate
        env:
          # Empty strings on schedule triggers; populated when the user provides
          # them via workflow_dispatch. Explicit values override auto-detection.
          INPUT_WEEK: ${{ inputs.week }}
          INPUT_SEASON: ${{ inputs.season }}
        run: |
          set -euo pipefail
          args=(--auto-write-to-recaps-dir)
          if [ -n "${INPUT_WEEK:-}" ]; then
            args+=(--week "$INPUT_WEEK")
          fi
          if [ -n "${INPUT_SEASON:-}" ]; then
            args+=(--season "$INPUT_SEASON")
          fi
          recap_path="$(python3 tools/weekly_recap.py "${args[@]}")"
          if [ -z "$recap_path" ]; then
            echo "Off-season — no recap written."
            echo "recap_path=" >> "$GITHUB_OUTPUT"
          else
            echo "Wrote recap to $recap_path"
            echo "recap_path=$recap_path" >> "$GITHUB_OUTPUT"
          fi

      - name: Parse season and week from path
        id: meta
        if: steps.generate.outputs.recap_path != ''
        run: |
          set -euo pipefail
          recap_path='${{ steps.generate.outputs.recap_path }}'
          # recaps/<season>/week-<NN>.md
          season="$(echo "$recap_path" | awk -F/ '{print $2}')"
          week="$(echo "$recap_path" | sed -E 's|.*/week-([0-9]+)\.md$|\1|')"
          echo "season=$season" >> "$GITHUB_OUTPUT"
          echo "week=$week" >> "$GITHUB_OUTPUT"

      - name: Open or update recap PR
        id: pr
        if: steps.generate.outputs.recap_path != ''
        uses: peter-evans/create-pull-request@v8
        with:
          # Deterministic branch name per (season, week). Re-running for the
          # same week updates the existing PR rather than opening a new one.
          branch: recap/${{ steps.meta.outputs.season }}-week-${{ steps.meta.outputs.week }}
          base: main
          commit-message: 'Weekly recap: ${{ steps.meta.outputs.season }} week ${{ steps.meta.outputs.week }}'
          title: 'Weekly recap: ${{ steps.meta.outputs.season }} week ${{ steps.meta.outputs.week }}'
          body: |
            Auto-generated by `.github/workflows/weekly_recap.yml`.

            File: `${{ steps.generate.outputs.recap_path }}`
          add-paths: ${{ steps.generate.outputs.recap_path }}
          delete-branch: true
          author: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          committer: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'

      - name: Post teaser to webhook
        # Only post when (a) a recap was written, (b) the PR action did
        # something (created or updated), and (c) the webhook secret is set.
        if: ${{ steps.generate.outputs.recap_path != '' && steps.pr.outputs.pull-request-number != '' && env.RECAP_WEBHOOK_URL != '' }}
        run: |
          set -euo pipefail
          teaser="$(python3 tools/weekly_recap.py --week '${{ steps.meta.outputs.week }}' --season '${{ steps.meta.outputs.season }}' --teaser)"
          link="${{ steps.pr.outputs.pull-request-url }}"
          format="${RECAP_WEBHOOK_FORMAT:-discord}"

          # Compose message and verify it fits the platform cap.
          message="$teaser"$'\n\n'"Full recap: $link"
          case "$format" in
            slack)
              cap=4000
              ;;
            discord|*)
              cap=2000
              ;;
          esac
          if [ "${#message}" -gt "$cap" ]; then
            echo "Teaser+link is ${#message} chars, exceeds $format cap of $cap" >&2
            exit 1
          fi

          # jq -Rs reads stdin as a single JSON-escaped string.
          if [ "$format" = "slack" ]; then
            payload="$(printf '%s' "$message" | jq -Rs '{text: .}')"
          else
            payload="$(printf '%s' "$message" | jq -Rs '{content: .}')"
          fi
          curl -fsS -X POST -H 'Content-Type: application/json' -d "$payload" "$RECAP_WEBHOOK_URL"
